<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PARAH — Espace Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        theme: { extend: {
            colors: {
                primary: "#003d9b",
                "primary-container": "#0052cc",
                secondary: "#ffad2f",
                "on-secondary": "#6c4400",
                surface: "#f9f9f9",
                "on-surface": "#1a1c1c",
                "on-surface-variant": "#434654",
                error: "#ba1a1a"
            }
        }}
    }
</script>
<style>
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,.font-head { font-family: 'Montserrat', system-ui, sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen">

<!-- ÉCRAN DE CONNEXION -->
<div class="hidden min-h-screen items-center justify-center px-4" id="login-screen">
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
<div class="text-center mb-8">
<div class="font-head text-3xl font-bold text-primary">PARAH</div>
<p class="text-on-surface-variant mt-2">Espace administrateur</p>
</div>
<form class="space-y-5" id="login-form">
<div>
<label class="block text-sm font-semibold mb-2" for="login-email">Email</label>
<input class="w-full rounded-lg border border-gray-300 p-3 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" id="login-email" placeholder="admin@parah.cg" required="" type="email"/>
</div>
<div>
<label class="block text-sm font-semibold mb-2" for="login-password">Mot de passe</label>
<input class="w-full rounded-lg border border-gray-300 p-3 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition" id="login-password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="hidden rounded-lg bg-red-50 text-red-700 text-sm p-3" id="login-error"></div>
<button class="w-full bg-primary hover:bg-primary-container text-white font-bold py-3 rounded-lg transition disabled:opacity-60" id="login-btn" type="submit">Se connecter</button>
</form>
<a class="block text-center text-sm text-on-surface-variant mt-6 hover:text-primary" href="index.html">← Retour au site</a>
</div>
</div>

<!-- TABLEAU DE BORD -->
<div class="hidden" id="dashboard">
<header class="bg-primary text-white">
<div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="font-head text-2xl font-bold">PARAH</span>
<span class="hidden sm:inline text-white/60">|</span>
<span class="hidden sm:inline text-white/90">Espace Admin</span>
</div>
<div class="flex items-center gap-3">
<span class="hidden sm:inline text-sm text-white/80" id="admin-email"></span>
<button class="bg-white/15 hover:bg-white/25 text-white text-sm font-semibold px-4 py-2 rounded-lg transition" id="logout-btn">Déconnexion</button>
</div>
</div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
<div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
<div>
<h1 class="font-head text-2xl sm:text-3xl font-bold text-primary">Inscriptions</h1>
<p class="text-on-surface-variant mt-1">Formation « Le Mindset de l'Entrepreneur »</p>
</div>
<div class="flex items-center gap-3">
<div class="bg-white rounded-xl border border-gray-100 shadow-sm px-5 py-3 text-center">
<div class="text-2xl font-bold text-primary" id="count">—</div>
<div class="text-xs uppercase tracking-wider text-on-surface-variant">Total</div>
</div>
<button class="bg-secondary hover:brightness-95 text-on-secondary font-bold px-4 py-3 rounded-xl transition" id="export-btn">Exporter CSV</button>
</div>
</div>

<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
<div class="overflow-x-auto">
<table class="w-full text-left text-sm">
<thead class="bg-gray-50 text-on-surface-variant uppercase text-xs tracking-wider">
<tr>
<th class="px-4 py-3 font-semibold">Nom</th>
<th class="px-4 py-3 font-semibold">Email</th>
<th class="px-4 py-3 font-semibold">Téléphone</th>
<th class="px-4 py-3 font-semibold">Projet</th>
<th class="px-4 py-3 font-semibold whitespace-nowrap">Date</th>
<th class="px-4 py-3 font-semibold text-right">Action</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-100" id="table-body">
<tr><td class="px-4 py-8 text-center text-on-surface-variant" colspan="6">Chargement…</td></tr>
</tbody>
</table>
</div>
</div>
<p class="text-xs text-on-surface-variant mt-4">Astuce : clique « Exporter CSV » pour ouvrir la liste dans Excel.</p>
</main>
</div>

<!-- CHARGEMENT INITIAL -->
<div class="min-h-screen flex items-center justify-center" id="loading">
<div class="h-10 w-10 animate-spin rounded-full border-4 border-primary border-t-transparent"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    // Config chargée depuis firebase-config.js (généré depuis .env, non committé)
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingEl = document.getElementById('loading');
    const loginScreen = document.getElementById('login-screen');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const tableBody = document.getElementById('table-body');
    const countEl = document.getElementById('count');

    let currentRows = [];

    function show(el) { el.classList.remove('hidden'); el.classList.add(el === loginScreen ? 'flex' : 'block'); }
    function hide(el) { el.classList.add('hidden'); el.classList.remove('flex', 'block'); }

    // Réagit à l'état de connexion
    onAuthStateChanged(auth, (user) => {
        hide(loadingEl);
        if (user) {
            hide(loginScreen);
            show(dashboard);
            document.getElementById('admin-email').textContent = user.email;
            loadInscriptions();
        } else {
            hide(dashboard);
            show(loginScreen);
        }
    });

    // Connexion
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.classList.add('hidden');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Connexion…';
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
            loginError.textContent = "Email ou mot de passe incorrect.";
            loginError.classList.remove('hidden');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Se connecter';
        }
    });

    // Déconnexion
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    function fmtDate(ts) {
        if (!ts || !ts.toDate) return '—';
        return ts.toDate().toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function esc(s) {
        return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    async function loadInscriptions() {
        try {
            const q = query(collection(db, 'inscriptions'), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            currentRows = [];
            snap.forEach(d => currentRows.push({ id: d.id, ...d.data() }));
            renderTable();
        } catch (err) {
            console.error(err);
            tableBody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-error">Erreur de chargement. Vérifiez les règles Firestore.</td></tr>';
        }
    }

    function renderTable() {
        countEl.textContent = currentRows.length;
        if (currentRows.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-on-surface-variant">Aucune inscription pour le moment.</td></tr>';
            return;
        }
        tableBody.innerHTML = currentRows.map(r => `
            <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 font-semibold">${esc(r.nom)}</td>
                <td class="px-4 py-3"><a class="text-primary hover:underline" href="mailto:${esc(r.email)}">${esc(r.email)}</a></td>
                <td class="px-4 py-3 whitespace-nowrap">${esc(r.telephone)}</td>
                <td class="px-4 py-3 max-w-xs truncate" title="${esc(r.projet)}">${esc(r.projet) || '<span class="text-gray-400">—</span>'}</td>
                <td class="px-4 py-3 whitespace-nowrap text-on-surface-variant">${fmtDate(r.createdAt)}</td>
                <td class="px-4 py-3 text-right">
                    <button class="text-error hover:underline text-xs font-semibold" data-del="${r.id}">Supprimer</button>
                </td>
            </tr>`).join('');

        tableBody.querySelectorAll('[data-del]').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('Supprimer définitivement cette inscription ?')) return;
                try {
                    await deleteDoc(doc(db, 'inscriptions', btn.dataset.del));
                    currentRows = currentRows.filter(r => r.id !== btn.dataset.del);
                    renderTable();
                } catch (err) {
                    alert("Impossible de supprimer (vérifiez les règles Firestore).");
                }
            });
        });
    }

    // Export CSV
    document.getElementById('export-btn').addEventListener('click', () => {
        if (currentRows.length === 0) { alert('Aucune inscription à exporter.'); return; }
        const headers = ['Nom', 'Email', 'Telephone', 'Projet', 'Date'];
        const lines = currentRows.map(r => [r.nom, r.email, r.telephone, r.projet || '', fmtDate(r.createdAt)]
            .map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(','));
        const csv = '﻿' + headers.join(',') + '\n' + lines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'inscriptions-parah-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
    });
</script>
</body>
</html>
